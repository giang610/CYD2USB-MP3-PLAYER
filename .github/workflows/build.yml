name: Build ESP32 Firmware
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - name: Setup
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "TFT_eSPI" "XPT2046_Touchscreen" "ESP8266Audio"
      - name: Copy User_Setup.h
        run: |
          F=$(find $HOME -name "User_Setup.h" -path "*/TFT_eSPI/*" | head -1)
          cp ./User_Setup.h "$F"
      - name: Compile
        run: arduino-cli compile --fqbn esp32:esp32:esp32 --output-dir ./build --export-binaries ./CYD_MP3_Player/CYD_MP3_Player.ino
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./build/*.bin
