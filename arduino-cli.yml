# arduino-cli.yaml
# Đặt file này ở thư mục gốc của repo
# Dùng khi chạy arduino-cli trên máy local

board_manager:
  additional_urls:
    - https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

library:
  enable_unsafe_install: true

output:
  no_color: false

sketch:
  always_export_binaries: true

logging:
  level: info
  format: text
